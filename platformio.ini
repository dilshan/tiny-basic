[platformio]
default_envs = due


[env:due]
platform = atmelsam
board = due
framework = arduino

extra_scripts = pre:parser_util.py


[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino

extra_scripts = pre:parser_util.py


[env:native]
platform = native
build_flags = -DNATIVE -D_GNU_SOURCE -lfl -lm
test_build_src = yes

extra_scripts = pre:parser_util.py